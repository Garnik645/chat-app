apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-service
  namespace: chat-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moderation-service
  template:
    metadata:
      labels:
        app: moderation-service
    spec:
      containers:
        - name: moderation-service
          image: chat-app/moderation-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: TOXICITY_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TOXICITY_THRESHOLD
            - name: SEXUAL_EXPLICIT_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SEXUAL_EXPLICIT_THRESHOLD
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
