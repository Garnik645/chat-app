server:
  port: 8080

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}          # Must be at least 32 characters (256 bits)

# ── Downstream service URLs ───────────────────────────────────────────────────
services:
  user-service: ${USER_SERVICE_URL}
  room-service: ${ROOM_SERVICE_URL}
  chat-service: ${CHAT_SERVICE_URL}

# ── Spring Cloud Gateway ──────────────────────────────────────────────────────
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Globalise the reactive WebClient pool settings
      httpclient:
        connect-timeout: 5000   # ms
        response-timeout: 30s

      routes:

        # ── Public routes (no JWT required) ────────────────────────────────
        - id: user-register
          uri: ${services.user-service}
          predicates:
            - Path=/api/users/register
            - Method=POST

        - id: user-login
          uri: ${services.user-service}
          predicates:
            - Path=/api/users/login
            - Method=POST

        # ── Protected User Service routes ───────────────────────────────────
        - id: user-service-protected
          uri: ${services.user-service}
          predicates:
            - Path=/api/users/**
            - Method=GET
          filters:
            - JwtAuthFilter

        # ── Protected Room Service routes ───────────────────────────────────
        - id: room-service-get
          uri: ${services.room-service}
          predicates:
            - Path=/api/rooms/**
            - Method=GET
          filters:
            - JwtAuthFilter

        - id: room-service-post
          uri: ${services.room-service}
          predicates:
            - Path=/api/rooms/**
            - Method=POST
          filters:
            - JwtAuthFilter

        - id: room-service-delete
          uri: ${services.room-service}
          predicates:
            - Path=/api/rooms/**
            - Method=DELETE
          filters:
            - JwtAuthFilter

        # ── Protected Chat Service HTTP routes ──────────────────────────────
        - id: chat-service-messages
          uri: ${services.chat-service}
          predicates:
            - Path=/api/messages/**
            - Method=GET
          filters:
            - JwtAuthFilter

        # ── WebSocket route to Chat Service ─────────────────────────────────
        # The URI scheme must be ws:// or wss:// for Spring Cloud Gateway to
        # perform a WebSocket upgrade proxy.  We derive ws:// from the http://
        # base URL of the Chat Service at runtime (see WebSocketUriConfig).
        # Token is validated from the ?token= query parameter by JwtAuthFilter.
        - id: chat-service-websocket
          uri: ${services.chat-service}
          predicates:
            - Path=/ws/**
          filters:
            - JwtAuthFilter

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.example.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
