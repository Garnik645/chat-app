# IMPORTANT: This is a template only.
# Replace the placeholder value with your actual base64-encoded secret before
# applying:   echo -n 'your-secret-here' | base64
#
# Never commit real secrets to source control.
# Use a secrets manager (e.g. AWS Secrets Manager, Vault, Sealed Secrets)
# to inject these values in production.

apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: chat-app
type: Opaque
data:
  # Replace with: echo -n 'your-jwt-secret-at-least-32-chars' | base64
  jwt-secret: REPLACE_WITH_BASE64_ENCODED_SECRET
