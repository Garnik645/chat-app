apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: chat-app
  labels:
    app: api-gateway
spec:
  # LoadBalancer exposes the gateway as the single external entry point.
  # Change to NodePort or use an Ingress controller if running on bare-metal.
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
