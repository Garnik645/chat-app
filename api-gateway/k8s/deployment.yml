apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: chat-app
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        # Prometheus scrape configuration — matches prometheus.yml job
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8080"
    spec:
      # Non-root security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: api-gateway
          image: chat-app/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # Sensitive values come from a Kubernetes Secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret

            # Non-sensitive service URLs come from a ConfigMap
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: service-urls
                  key: user-service-url

            - name: ROOM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: service-urls
                  key: room-service-url

            - name: CHAT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: service-urls
                  key: chat-service-url

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
