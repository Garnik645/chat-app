# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Replace placeholder values with real base64-encoded secrets before
# applying. Never commit real secrets to source control.
#
# To encode:  echo -n "mysecret" | base64
# To apply:   kubectl apply -f secret.yml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: chat
type: Opaque
data:
  DB_USERNAME: <base64-encoded-username>
  DB_PASSWORD: <base64-encoded-password>
  JWT_SECRET: <base64-encoded-jwt-secret-min-32-chars>
