# ─────────────────────────────────────────────────────────────────────────────
# prometheus.yml SNIPPET — Chat Service
#
# Add the job below under the `scrape_configs:` section of your root
# prometheus.yml file.
# ─────────────────────────────────────────────────────────────────────────────

scrape_configs:
  - job_name: chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - chat-service:8083
