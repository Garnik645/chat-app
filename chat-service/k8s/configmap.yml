apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-service-config
  namespace: chatapp
data:
  DB_URL: "jdbc:postgresql://chat-db:5432/chatdb"

---
# Shared ConfigMap (apply once, referenced by all services)
apiVersion: v1
kind: ConfigMap
metadata:
  name: common-config
  namespace: chatapp
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  ROOM_SERVICE_URL: "http://room-service:8082"
