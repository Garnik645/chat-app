# IMPORTANT: Replace placeholder values with actual base64-encoded secrets before applying.
# To encode: echo -n 'your-value' | base64
#
# Apply with: kubectl apply -f secret.yml
# Never commit real secret values to source control.

apiVersion: v1
kind: Secret
metadata:
  name: chat-service-secret
  namespace: chatapp
type: Opaque
data:
  # echo -n 'chatuser' | base64
  DB_USERNAME: Y2hhdHVzZXI=
  # echo -n 'CHANGE_ME' | base64  ← replace before applying
  DB_PASSWORD: Q0hBTkdFX01F

---
# Shared Secret (apply once, referenced by all services)
apiVersion: v1
kind: Secret
metadata:
  name: common-secret
  namespace: chatapp
type: Opaque
data:
  # echo -n 'CHANGE_ME_JWT_SECRET_MIN_32_CHARS' | base64  ← replace before applying
  JWT_SECRET: Q0hBTkdFX01FX0pXVF9TRUNSRVRfTUlOXzMyX0NIQVJT
