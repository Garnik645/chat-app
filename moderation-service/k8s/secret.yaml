# IMPORTANT: Do NOT commit real secret values to source control.
# Replace the placeholder below with the base64-encoded value before applying:
#
#   echo -n "your-real-api-key" | base64
#
# Then apply with:
#   kubectl apply -f secret.yaml -n chat-app
#
# In production, prefer an external secrets manager (e.g., AWS Secrets Manager,
# HashiCorp Vault, or Sealed Secrets) over static YAML secrets in Git.
apiVersion: v1
kind: Secret
metadata:
  name: moderation-secrets
  namespace: chat-app
type: Opaque
data:
  # base64-encoded value of your Perspective API key
  PERSPECTIVE_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
