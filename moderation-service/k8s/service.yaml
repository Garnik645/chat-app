apiVersion: v1
kind: Service
metadata:
  name: moderation-service
  namespace: chat-app
  labels:
    app: moderation-service
spec:
  # ClusterIP only — this service is not accessed externally.
  # It exposes /health and /metrics internally for Prometheus scraping.
  type: ClusterIP
  selector:
    app: moderation-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
